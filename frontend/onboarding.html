<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conozcámonos — Medic-Taste</title>
  <link rel="icon" href="assets/icons/favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components/forms.css">

  <style>
    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* ---------- Wrapper: card + doctor panel ---------- */

    .onboarding-wrapper {
      display: grid;
      grid-template-columns: minmax(0, 620px) minmax(0, 380px);
      width: 100%;
      max-width: 1000px;
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow-xl);
      animation: scaleIn 0.4s ease forwards;
      background: var(--surface);
    }

    .onboarding-card {
      background: var(--surface);
      padding: 3rem;
      position: relative;
    }

    .onboarding-card .navbar-logo {
      justify-content: flex-start;
      margin-bottom: 1.25rem;
    }

    .onboarding-card .navbar-logo:hover {
      color: var(--text);
    }

    .clinical-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--primary-light);
      color: var(--primary);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }

    .clinical-badge svg { width: 14px; height: 14px; flex-shrink: 0; }

    .onboarding-card h1 {
      font-size: 1.75rem;
      margin-bottom: 0.25rem;
      -webkit-text-fill-color: initial;
      background: none;
      color: var(--text);
    }

    .onboarding-card > p.subtitle {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 1.75rem;
    }

    /* ---------- Progress: "vitals" strip ---------- */

    .q-progress-wrap {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      margin-bottom: 2rem;
    }

    .q-progress {
      display: flex;
      gap: 0.4rem;
      flex: 1;
    }

    .q-progress-bar {
      height: 5px;
      flex: 1;
      border-radius: 3px;
      background: var(--border-light);
      position: relative;
      overflow: hidden;
      transition: background var(--transition);
    }

    .q-progress-bar::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--primary);
      border-radius: 3px;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .q-progress-bar.active::after { transform: scaleX(1); }
    .q-progress-bar.filled::after { transform: scaleX(1); }

    .q-step-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--primary);
      white-space: nowrap;
    }

    .q-step {
      display: none;
    }

    .q-step.active {
      display: block;
    }

    .q-step-eyebrow {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .q-step-eyebrow::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary);
      flex-shrink: 0;
    }

    .q-step h2 {
      font-size: 1.3rem;
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    .q-options {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .q-option {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 1rem 1.1rem;
      border: 1.5px solid var(--border-light);
      border-left: 4px solid var(--border-light);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      background: var(--surface);
    }

    .q-option:hover {
      border-color: var(--primary);
      border-left-color: var(--primary);
      background: var(--primary-light);
      transform: translateX(4px);
    }

    .q-option.selected {
      border-color: var(--primary);
      border-left-color: var(--primary);
      background: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(0, 137, 123, 0.12);
      transform: translateX(4px);
    }

    .q-option .q-check {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      border-radius: 50%;
      border: 2px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .q-option input[type="checkbox"] ~ .q-check { border-radius: 5px; }

    .q-option.selected .q-check {
      border-color: var(--primary);
      background: var(--primary);
    }

    .q-option .q-check svg {
      width: 11px;
      height: 11px;
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.2s ease;
    }

    .q-option.selected .q-check svg {
      opacity: 1;
      transform: scale(1);
    }

    .q-option input[type="radio"],
    .q-option input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .q-option label {
      cursor: pointer;
      font-weight: 500;
      flex: 1;
      color: var(--text);
    }

    .q-option small {
      display: block;
      font-weight: 400;
      color: var(--text-secondary);
      font-size: 0.8rem;
      margin-top: 0.15rem;
    }

    .q-actions {
      display: flex;
      gap: 1rem;
      justify-content: space-between;
      margin-top: 2rem;
    }

    .q-actions .btn {
      min-width: 140px;
    }

    .q-error {
      color: var(--error);
      font-size: 0.85rem;
      margin-top: 0.5rem;
      animation: shakeX 0.4s ease;
    }

    @keyframes shakeX {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    @keyframes bounceIn {
      0% { opacity: 0; transform: scale(0.3); }
      50% { opacity: 1; transform: scale(1.05); }
      70% { transform: scale(0.95); }
      100% { transform: scale(1); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes doctorIn {
      0% { opacity: 0; transform: translateX(-28px) scale(0.96); }
      100% { opacity: 1; transform: translateX(0) scale(1); }
    }

    @keyframes doctorOut {
      0% { opacity: 1; transform: translateX(0) scale(1); }
      100% { opacity: 0; transform: translateX(28px) scale(0.96); }
    }

    @keyframes floatSlow {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .q-result {
      text-align: center;
    }

    .q-result .emoji {
      font-size: 4rem;
      margin-bottom: 1rem;
      animation: bounceIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .q-result h1 {
      -webkit-text-fill-color: initial;
      background: none;
    }

    .q-result .btn {
      animation: pulse 2s ease infinite;
    }

    /* ---------- Right panel: doctor illustration ---------- */

    .onboarding-visual {
      position: relative;
      background: linear-gradient(165deg, #00897B 0%, #00695C 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 2rem;
      overflow: hidden;
    }

    .visual-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.12;
      background-image:
        linear-gradient(#fff 2px, transparent 2px),
        linear-gradient(90deg, #fff 2px, transparent 2px);
      background-size: 34px 34px;
      background-position: 8px 13px, 13px 8px;
      -webkit-mask-image: radial-gradient(circle at 50% 40%, #000 55%, transparent 90%);
      mask-image: radial-gradient(circle at 50% 40%, #000 55%, transparent 90%);
    }

    .visual-orb {
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      top: -60px;
      right: -70px;
    }

    .visual-orb.small {
      width: 140px;
      height: 140px;
      top: auto;
      bottom: -50px;
      left: -50px;
      right: auto;
    }

    .visual-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .visual-illustration {
      width: 220px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: floatSlow 4s ease-in-out infinite;
    }

    .visual-illustration svg {
      width: 100%;
      height: 100%;
    }

    .visual-illustration.entering {
      animation: doctorIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards, floatSlow 4s ease-in-out 0.5s infinite;
    }

    .visual-illustration.leaving {
      animation: doctorOut 0.25s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .visual-tip-label {
      color: #B2DFDB;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 1.25rem;
      margin-bottom: 0.4rem;
    }

    .visual-tip {
      color: #fff;
      font-size: 0.95rem;
      line-height: 1.5;
      max-width: 280px;
      min-height: 3.2em;
    }

    @media (max-width: 860px) {
      .onboarding-wrapper {
        grid-template-columns: 1fr;
        max-width: 480px;
      }
      .onboarding-visual {
        order: -1;
        padding: 1.75rem;
      }
      .visual-illustration {
        width: 140px;
        height: 140px;
      }
      .visual-tip {
        max-width: none;
        min-height: 0;
      }
    }

    @media (max-width: 480px) {
      .onboarding-card {
        padding: 1.5rem;
      }
      .q-actions {
        flex-direction: column;
      }
      .q-actions .btn {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .visual-illustration,
      .visual-illustration.entering,
      .visual-illustration.leaving {
        animation: none !important;
      }
    }
  </style>
</head>
<body>

  <div class="onboarding-wrapper">
    <div class="onboarding-card" id="onboardingCard">
      <a href="/" class="navbar-logo">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="10" fill="#00897B"/>
          <path d="M18 27.5C23 27.5 27 23.5 27 18C27 13 23 11 18 12C13 11 9 13 9 18C9 23.5 13 27.5 18 27.5Z" fill="#80CBC4"/>
          <path d="M16 11.5L18 8.5L20 11.5Z" fill="#00897B"/>
          <path d="M18 10V7" stroke="#4DB6AC" stroke-width="2" stroke-linecap="round"/>
          <path d="M18 8.5C21 6.5 24 7.5 23.5 10C23 12 20 11 18 8.5Z" fill="#4DB6AC"/>
        </svg>
        Medic-Taste
      </a>

      <span class="clinical-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v4a4 4 0 0 0 8 0V3"/><path d="M12 12v6"/><circle cx="19" cy="15" r="2"/><path d="M8 12a4 4 0 0 0-4 4v0a5 5 0 0 0 5 5h6"/></svg>
        Ficha nutricional
      </span>

      <h1>Conozcámonos</h1>
      <p class="subtitle">Responde estas preguntas para que podamos recomendarte el plan ideal.</p>

      <div id="onboardingContent"></div>
    </div>

    <div class="onboarding-visual" id="onboardingVisual">
      <div class="visual-pattern"></div>
      <div class="visual-orb"></div>
      <div class="visual-orb small"></div>
      <div class="visual-content">
        <div class="visual-illustration" id="visualIllustration"></div>
        <p class="visual-tip-label">Nota del especialista</p>
        <p class="visual-tip" id="visualTip"></p>
      </div>
    </div>
  </div>

  <script type="module">
    import { get, post } from './js/services/api.js';
    import { CONFIG } from './js/config.js';
    import { isAuthenticated, completeOnboarding } from './js/services/authService.js';
    import { hasCompletedQuestionnaire } from './js/pages/questionnaire.js';

    if (!isAuthenticated()) {
      window.location.href = '/login.html';
    }

    if (hasCompletedQuestionnaire()) {
      window.location.href = '/app.html';
    }

    const STORAGE_KEY = 'tf_preferences';
    const content = document.getElementById('onboardingContent');
    const checkIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

    const questions = [
      {
        title: '¿Cómo te describirías?',
        subtitle: 'Selecciona tu tipo de alimentación',
        name: 'diet',
        type: 'radio',
        tip: 'Tu tipo de alimentación es la base de tu historial nutricional y guía cada receta que te sugerimos.',
        accessory: 'stethoscope',
        options: [
          { value: 'omnivore', label: 'Omnívoro', desc: 'Como de todo sin restricciones' },
          { value: 'vegetarian', label: 'Vegetariano', desc: 'No como carne ni pescado' },
          { value: 'vegan', label: 'Vegano', desc: 'No como ningún producto animal' },
          { value: 'keto', label: 'Keto / Bajo en carbos', desc: 'Dieta alta en grasas y baja en carbohidratos' },
          { value: 'pescatarian', label: 'Pescetariano', desc: 'No como carne, pero sí pescado' },
        ],
      },
      {
        title: '¿Tienes alguna alergia?',
        subtitle: 'Puedes seleccionar varias opciones',
        name: 'allergies',
        type: 'checkbox',
        tip: 'Registrar tus alergias nos permite descartar automáticamente cualquier receta de riesgo.',
        accessory: 'allergy',
        options: [
          { value: 'gluten', label: 'Gluten' },
          { value: 'lactose', label: 'Lactosa' },
          { value: 'nuts', label: 'Frutos secos' },
          { value: 'eggs', label: 'Huevo' },
          { value: 'soy', label: 'Soja' },
          { value: 'none', label: 'Ninguna' },
        ],
      },
      {
        title: '¿Cuál es tu objetivo principal?',
        subtitle: 'Esto nos ayuda a ajustar las porciones y nutrientes',
        name: 'goal',
        type: 'radio',
        tip: 'Definir tu objetivo nos permite calibrar calorías, porciones y nutrientes a tu medida.',
        accessory: 'goal',
        options: [
          { value: 'lose', label: 'Perder peso', desc: 'Reducir calorías y grasas' },
          { value: 'maintain', label: 'Mantener peso', desc: 'Comer balanceado' },
          { value: 'gain', label: 'Ganar músculo', desc: 'Aumentar proteínas y calorías' },
          { value: 'energy', label: 'Más energía', desc: 'Comidas ligeras y nutritivas' },
        ],
      },
      {
        title: '¿Cuántas comidas al día prefieres?',
        subtitle: 'Incluyendo comidas principales y snacks',
        name: 'meals',
        type: 'radio',
        tip: 'La frecuencia de tus comidas influye en tu energía y en cómo distribuimos tus nutrientes.',
        accessory: 'meals',
        options: [
          { value: '3', label: '3 comidas', desc: 'Desayuno, almuerzo y cena' },
          { value: '4', label: '4 comidas', desc: '3 comidas + 1 snack' },
          { value: '5', label: '5 comidas', desc: '3 comidas + 2 snacks' },
        ],
      },
      {
        title: '¿Cuánto tiempo quieres dedicar a cocinar?',
        subtitle: 'Recetas ajustadas a tu disponibilidad',
        name: 'cookTime',
        type: 'radio',
        tip: 'Adaptamos cada receta a tu tiempo disponible, sin sacrificar el valor nutricional.',
        accessory: 'time',
        options: [
          { value: 'quick', label: 'Rápido y fácil', desc: 'Menos de 20 minutos' },
          { value: 'moderate', label: 'Moderado', desc: 'Entre 20 y 40 minutos' },
          { value: 'elaborate', label: 'Elaborado', desc: 'Más de 40 minutos' },
        ],
      },
    ];

    /* ---------- Doctor illustrations (inline SVG, brand palette) ---------- */

    const accessoryIcons = {
      stethoscope: '<circle cx="0" cy="0" r="19" fill="#00695C"/><path d="M-8 -7v6a8 8 0 0 0 16 0v-6" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round"/><circle cx="8" cy="6" r="3.2" fill="#fff"/><circle cx="-8" cy="-8" r="2" fill="#fff"/><circle cx="8" cy="-8" r="2" fill="#fff"/>',
      allergy: '<circle cx="0" cy="0" r="19" fill="#00695C"/><circle cx="-3" cy="-1" r="7" fill="none" stroke="#fff" stroke-width="2.2"/><line x1="2" y1="4" x2="9" y2="11" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/>',
      goal: '<circle cx="0" cy="0" r="19" fill="#00695C"/><path d="M0 8c-5-4-9-7-9-11.5A5 5 0 0 1 0 -6a5 5 0 0 1 9 2.5C9 1 5 4 0 8Z" fill="#fff"/><polyline points="-7,-1 -3,-1 -1,-5 2,3 4,-1 7,-1" fill="none" stroke="#00897B" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>',
      meals: '<circle cx="0" cy="0" r="19" fill="#00695C"/><circle cx="0" cy="0" r="9" fill="none" stroke="#fff" stroke-width="2.2"/><circle cx="0" cy="0" r="2.4" fill="#fff"/>',
      time: '<circle cx="0" cy="0" r="19" fill="#00695C"/><circle cx="0" cy="1" r="9.5" fill="none" stroke="#fff" stroke-width="2.2"/><line x1="0" y1="1" x2="0" y2="-4.5" stroke="#fff" stroke-width="2" stroke-linecap="round"/><line x1="0" y1="1" x2="4" y2="3.5" stroke="#fff" stroke-width="2" stroke-linecap="round"/><line x1="-3.5" y1="-8" x2="3.5" y2="-8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>',
      success: '<circle cx="0" cy="0" r="19" fill="#00695C"/><path d="M-8 0l5.5 5.5L9 -5" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>',
    };

    function doctorSVG(accessoryKey) {
      const badge = accessoryIcons[accessoryKey] || accessoryIcons.stethoscope;
      return `
      <svg viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="110" cy="200" rx="62" ry="10" fill="#004D40" opacity="0.25"/>
        <rect x="70" y="118" width="80" height="86" rx="26" fill="#FFFFFF"/>
        <rect x="70" y="118" width="80" height="86" rx="26" fill="none" stroke="#B2DFDB" stroke-width="2"/>
        <path d="M96 118 L110 138 L124 118" fill="none" stroke="#80CBC4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="47" y="128" width="26" height="62" rx="13" fill="#00897B"/>
        <rect x="147" y="128" width="26" height="62" rx="13" fill="#00897B"/>
        <circle cx="110" cy="76" r="38" fill="#80CBC4"/>
        <path d="M74 68a36 36 0 0 1 72 0c0-14-8-26-22-30-6 8-16 12-28 10-8 10-16 12-22 20Z" fill="#00897B"/>
        <circle cx="96" cy="80" r="3.4" fill="#00695C"/>
        <circle cx="124" cy="80" r="3.4" fill="#00695C"/>
        <path d="M100 94c4 4 16 4 20 0" stroke="#00695C" stroke-width="2.4" fill="none" stroke-linecap="round"/>
        <g transform="translate(178,150)">${badge}</g>
      </svg>`;
    }

    const successSVG = `
      <svg viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="110" cy="200" rx="62" ry="10" fill="#004D40" opacity="0.25"/>
        <rect x="70" y="118" width="80" height="86" rx="26" fill="#FFFFFF"/>
        <rect x="70" y="118" width="80" height="86" rx="26" fill="none" stroke="#B2DFDB" stroke-width="2"/>
        <path d="M96 118 L110 138 L124 118" fill="none" stroke="#80CBC4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="47" y="128" width="26" height="62" rx="13" fill="#00897B"/>
        <rect x="147" y="128" width="26" height="62" rx="13" fill="#00897B"/>
        <circle cx="110" cy="76" r="38" fill="#80CBC4"/>
        <path d="M74 68a36 36 0 0 1 72 0c0-14-8-26-22-30-6 8-16 12-28 10-8 10-16 12-22 20Z" fill="#00897B"/>
        <path d="M92 78c1.5 3 4.5 3 6 0" stroke="#00695C" stroke-width="2.4" fill="none" stroke-linecap="round"/>
        <path d="M122 78c1.5 3 4.5 3 6 0" stroke="#00695C" stroke-width="2.4" fill="none" stroke-linecap="round"/>
        <path d="M98 92c5 5 19 5 24 0" stroke="#00695C" stroke-width="2.4" fill="none" stroke-linecap="round"/>
        <g transform="translate(178,150)">${accessoryIcons.success}</g>
      </svg>`;

    let currentStep = 0;
    const answers = loadPrefs() || {};

    function loadPrefs() {
      try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : null; }
      catch { return null; }
    }

    function savePrefs() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(answers));
    }

    function buildProgress() {
      let html = `<span class="q-step-label">Paso ${currentStep + 1} de ${questions.length}</span>`;
      html += '<div class="q-progress" id="qProgress">';
      questions.forEach((_, i) => {
        html += `<div class="q-progress-bar ${i === currentStep ? 'active' : ''} ${i < currentStep ? 'filled' : ''}"></div>`;
      });
      html += '</div>';

      const wrap = document.getElementById('qProgressWrap');
      wrap.innerHTML = html;
    }

    function updateVisual(index, direction) {
      const q = questions[index];
      const illustration = document.getElementById('visualIllustration');
      const tip = document.getElementById('visualTip');

      illustration.classList.remove('entering');
      illustration.classList.add('leaving');

      setTimeout(() => {
        illustration.innerHTML = doctorSVG(q.accessory);
        illustration.classList.remove('leaving');
        void illustration.offsetWidth;
        illustration.classList.add('entering');
        tip.textContent = q.tip;
      }, 220);
    }

    function buildStep(index, direction) {
      const q = questions[index];
      const val = answers[q.name];
      const inAnim = direction === 'prev' ? 'slideInLeft' : 'slideInRight';

      let html = `<div class="q-step active" style="animation:${inAnim} 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards">`;
      html += `<div class="q-step-eyebrow">Pregunta ${index + 1}</div>`;
      html += `<h2>${q.title}</h2>`;
      html += `<p style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:1.5rem">${q.subtitle}</p>`;
      html += '<div class="q-options">';
      q.options.forEach((opt, i) => {
        const checked = q.type === 'checkbox'
          ? (Array.isArray(val) && val.includes(opt.value))
          : val === opt.value;
        html += `<div class="q-option ${checked ? 'selected' : ''}" style="animation:fadeIn 0.3s ease ${i * 0.06}s both">
          <input type="${q.type}" name="${q.name}" value="${opt.value}" ${checked ? 'checked' : ''}>
          <span class="q-check">${checkIcon}</span>
          <label>${opt.label}${opt.desc ? `<small>${opt.desc}</small>` : ''}</label>
        </div>`;
      });
      html += '</div></div>';

      document.getElementById('qStepContainer').innerHTML = html;

      document.querySelectorAll('.q-option').forEach(opt => {
        const input = opt.querySelector('input');
        opt.addEventListener('click', (e) => {
          if (e.target.tagName !== 'INPUT') input.checked = !input.checked;
          if (q.type === 'radio') {
            document.querySelectorAll('.q-option').forEach(o => o.classList.remove('selected'));
            if (input.checked) opt.classList.add('selected');
            answers[q.name] = input.value;
          } else {
            if (q.name === 'allergies') {
              if (input.value === 'none' && input.checked) {
                document.querySelectorAll('.q-option').forEach(o => {
                  const inp = o.querySelector('input');
                  if (inp.value !== 'none') {
                    inp.checked = false;
                  inp.disabled = true;
                  inp.closest('.q-option').classList.add('disabled');
                  o.classList.remove('selected');
                  }
                });
                answers[q.name] = ['none'];
              } else if (input.value !== 'none' && input.checked) {
                const noneOpt = Array.from(document.querySelectorAll('.q-option')).find(o => o.querySelector('input').value === 'none');
                if (noneOpt) {
                  const noneInp = noneOpt.querySelector('input');
                  noneInp.checked = false;
                  noneOpt.classList.remove('selected');
                }
                document.querySelectorAll('.q-option').forEach(o => {
                  const inp = o.querySelector('input');
                  inp.disabled = false;
                  o.classList.remove('disabled');
                });
                answers[q.name] = [...document.querySelectorAll(`input[name="${q.name}"]:checked`)].map(el => el.value);
              } else {
                answers[q.name] = [...document.querySelectorAll(`input[name="${q.name}"]:checked`)].map(el => el.value);
                if (!answers[q.name].length) {
                  document.querySelectorAll('.q-option').forEach(o => {
                    o.querySelector('input').disabled = false;
                    o.classList.remove('disabled');
                  });
                }
              }
            } else {
              opt.classList.toggle('selected', input.checked);
              answers[q.name] = [...document.querySelectorAll(`input[name="${q.name}"]:checked`)].map(el => el.value);
            }
          }
          savePrefs();
        });
        input.addEventListener('change', () => {
          if (q.type === 'radio') {
            document.querySelectorAll('.q-option').forEach(o => o.classList.remove('selected'));
            if (input.checked) opt.classList.add('selected');
            answers[q.name] = input.value;
          } else {
            if (q.name === 'allergies') {
              if (input.value === 'none' && input.checked) {
                document.querySelectorAll('.q-option').forEach(o => {
                  const inp = o.querySelector('input');
                  if (inp.value !== 'none') {
                    inp.checked = false;
                  inp.disabled = true;
                  inp.closest('.q-option').classList.add('disabled');
                  o.classList.remove('selected');
                  }
                });
                answers[q.name] = ['none'];
              } else if (input.value !== 'none' && input.checked) {
                const noneOpt = Array.from(document.querySelectorAll('.q-option')).find(o => o.querySelector('input').value === 'none');
                if (noneOpt) {
                  const noneInp = noneOpt.querySelector('input');
                  noneInp.checked = false;
                  noneOpt.classList.remove('selected');
                }
                document.querySelectorAll('.q-option').forEach(o => {
                  const inp = o.querySelector('input');
                  inp.disabled = false;
                  o.classList.remove('disabled');
                });
                answers[q.name] = [...document.querySelectorAll(`input[name="${q.name}"]:checked`)].map(el => el.value);
              } else {
                answers[q.name] = [...document.querySelectorAll(`input[name="${q.name}"]:checked`)].map(el => el.value);
                if (!answers[q.name].length) {
                  document.querySelectorAll('.q-option').forEach(o => {
                    o.querySelector('input').disabled = false;
                    o.classList.remove('disabled');
                  });
                }
              }
            } else {
              opt.classList.toggle('selected', input.checked);
              answers[q.name] = [...document.querySelectorAll(`input[name="${q.name}"]:checked`)].map(el => el.value);
            }
          }
          savePrefs();
        });
      });
    }

    function showStep(index, direction) {
      currentStep = index;
      buildProgress();
      updateVisual(index, direction);

      const container = document.getElementById('qStepContainer');
      const currentEl = container.querySelector('.q-step');

      if (currentEl) {
        const outAnim = direction === 'prev' ? 'slideOutRight' : 'slideOutLeft';
        currentEl.style.animation = `${outAnim} 0.25s cubic-bezier(0.4, 0, 0.2, 1) forwards`;
        setTimeout(() => {
          buildStep(index, direction);
        }, 260);
      } else {
        buildStep(index, 'next');
      }

      document.getElementById('qPrevBtn').style.visibility = index === 0 ? 'hidden' : 'visible';
      document.getElementById('qNextBtn').textContent = index === questions.length - 1 ? 'Generar mi plan' : 'Siguiente';
    }

    function render() {
      content.innerHTML = `
        <div class="q-progress-wrap" id="qProgressWrap"></div>
        <div id="qStepContainer"></div>
        <div class="q-actions">
          <button class="btn btn-outline" id="qPrevBtn" style="visibility:hidden">Anterior</button>
          <button class="btn btn-primary" id="qNextBtn">Siguiente</button>
        </div>
      `;

      document.getElementById('qPrevBtn').addEventListener('click', () => {
        if (currentStep > 0) showStep(currentStep - 1, 'prev');
      });

      document.getElementById('qNextBtn').addEventListener('click', async () => {
        const q = questions[currentStep];
        const val = answers[q.name];
        if (q.type === 'radio' && !val) {
          showError('Selecciona una opción antes de continuar');
          return;
        }
        if (q.type === 'checkbox' && (!Array.isArray(val) || val.length === 0)) {
          showError('Selecciona al menos una opción');
          return;
        }

        if (currentStep < questions.length - 1) {
          showStep(currentStep + 1, 'next');
        } else {
          await generatePlan();
        }
      });

      showStep(0, 'next');
    }

    function showError(msg) {
      const existing = document.querySelector('.q-error');
      if (!existing) {
        const err = document.createElement('p');
        err.className = 'q-error';
        err.textContent = msg;
        document.getElementById('qStepContainer').appendChild(err);
      }
    }

    async function generatePlan() {
      const nextBtn = document.getElementById('qNextBtn');
      nextBtn.disabled = true;
      nextBtn.textContent = 'Generando...';

      const illustration = document.getElementById('visualIllustration');
      const tip = document.getElementById('visualTip');
      illustration.classList.remove('entering');
      illustration.classList.add('leaving');
      setTimeout(() => {
        illustration.innerHTML = successSVG;
        illustration.classList.remove('leaving');
        void illustration.offsetWidth;
        illustration.classList.add('entering');
        tip.textContent = 'Tu ficha nutricional está completa. Preparamos tu plan semanal a la medida.';
      }, 220);

      try {
        const prefs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        const diet = prefs.diet || '';
        const maxTime = prefs.cookTime === 'quick' ? 20 : prefs.cookTime === 'moderate' ? 40 : 200;
        const mealsCount = parseInt(prefs.meals || '4', 10);

        const params = new URLSearchParams();
        if (diet && diet !== 'omnivore') params.set('diet', diet);
        params.set('limit', '50');

        let recipes = [];
        try {
          const res = await fetch(`${CONFIG.API_URL}/recipes?${params}`);
          const data = await res.json();
          if (Array.isArray(data)) recipes = data;
        } catch {}

        if (!recipes.length && diet !== 'omnivore') {
          params.set('diet', '');
          try {
            const res = await fetch(`${CONFIG.API_URL}/recipes?limit=50`);
            const data = await res.json();
            if (Array.isArray(data)) recipes = data;
          } catch {}
        }

        if (!recipes.length) {
          recipes = [
            { id: 1, name: 'Pollo con arroz', prep_time_minutes: 35 },
            { id: 2, name: 'Ensalada César', prep_time_minutes: 20 },
            { id: 3, name: 'Pasta al pesto', prep_time_minutes: 25 },
            { id: 4, name: 'Tortilla de patatas', prep_time_minutes: 30 },
            { id: 5, name: 'Batido de plátano', prep_time_minutes: 5 },
            { id: 6, name: 'Ensalada de aguacate', prep_time_minutes: 10 },
            { id: 7, name: 'Lentejas guisadas', prep_time_minutes: 45 },
            { id: 8, name: 'Tostada de aguacate', prep_time_minutes: 10 },
          ];
        }

        const filtered = recipes.filter(r => {
          if (maxTime < 200 && r.prep_time_minutes && r.prep_time_minutes > maxTime) return false;
          return true;
        });

        const shuffled = [...(filtered.length ? filtered : recipes)].sort(() => Math.random() - 0.5);
        const mealTypes = ['desayuno', 'almuerzo', 'cena'];
        if (mealsCount >= 4) mealTypes.push('snack');
        if (mealsCount >= 5) mealTypes.push('snack');

        const weekPlan = {};
        let recipeIndex = 0;
        const today = new Date();
        const monday = new Date(today);
        monday.setDate(today.getDate() - today.getDay() + 1);

        for (let d = 0; d < 7; d++) {
          const date = new Date(monday);
          date.setDate(monday.getDate() + d);
          const dateStr = date.toISOString().split('T')[0];
          const dayMeals = [];

          for (const mealType of [...new Set(mealTypes)]) {
            const recipe = shuffled[recipeIndex % shuffled.length];
            recipeIndex++;
            dayMeals.push({
              recipe_id: recipe.id,
              recipe_name: recipe.name,
              meal_type: mealType,
              plan_date: dateStr,
            });
          }
          weekPlan[dateStr] = dayMeals;
        }

        localStorage.setItem('tf_week_plan', JSON.stringify(weekPlan));
        localStorage.setItem('tf_questionnaire_done', 'true');

        const allMeals = Object.entries(weekPlan).flatMap(([dateStr, meals]) =>
          meals.map((meal) => ({
            recipe_id: meal.recipe_id,
            plan_date: dateStr,
            meal_type: meal.meal_type,
          }))
        );
        await Promise.allSettled(allMeals.map((m) => post('/planner', m)));

        completeOnboarding().catch(() => {});

        content.innerHTML = `
          <div class="q-result">
            <div class="emoji">🎉</div>
            <h1>¡Plan generado!</h1>
            <p style="text-align:center;color:var(--text-secondary);margin-bottom:2rem">Hemos creado un menú semanal personalizado para ti.</p>
            <div style="display:flex;flex-direction:column;gap:0.75rem;align-items:center">
              <a href="/app.html" class="btn btn-primary btn-lg" style="animation:pulse 2s ease infinite;text-decoration:none">Ver mi plan semanal</a>
              <a href="/app.html" class="btn btn-outline" style="text-decoration:none">Ir al Dashboard</a>
            </div>
          </div>
        `;

      } catch (err) {
        content.innerHTML = `
          <div style="text-align:center;padding:2rem">
            <p style="color:var(--error)">Error al generar el plan.</p>
            <button class="btn btn-primary" onclick="location.reload()" style="margin-top:1rem">Intentar de nuevo</button>
          </div>
        `;
      }
    }

    render();
  </script>
</body>
</html>
