<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TasteFlow — App</title>
  <link rel="icon" href="assets/icons/favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components/sidebar.css">
  <script>
    (function() {
      var saved = localStorage.getItem('tf_theme');
      if (saved === 'dark') document.documentElement.classList.add('dark');
      else if (saved === 'light') document.documentElement.classList.add('light');
      else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.classList.add('dark');
    })();
  </script>
  <link rel="stylesheet" href="css/components/dashboard.css">
  <link rel="stylesheet" href="css/components/planner.css">
  <link rel="stylesheet" href="css/components/plans.css">
  <link rel="stylesheet" href="css/components/app-pages.css">
  <link rel="stylesheet" href="css/components/shopping.css">
</head>
<body>

  <!-- Mobile overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="/" class="navbar-logo">
          <svg width="32" height="32" viewBox="0 0 36 36" fill="none">
            <rect width="36" height="36" rx="10" fill="#00897B"/>
            <path d="M18 9C15.5 9 13 10.5 12 13C11 15.5 11 18.5 12 21C13 23.5 15 26 18 27C21 26 23 23.5 24 21C25 18.5 25 15.5 24 13C23 10.5 20.5 9 18 9Z" fill="#80CBC4"/>
            <path d="M18 12C16.5 12 15 13 14.5 14.5C14 16 14 18 14.5 19.5C15 21 16.5 22.5 18 23C19.5 22.5 21 21 21.5 19.5C22 18 22 16 21.5 14.5C21 13 19.5 12 18 12Z" fill="#4DB6AC"/>
            <path d="M17.5 9C17.5 9 16 7 17 5.5C18 4 19 5.5 19 5.5" stroke="#80CBC4" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          </svg>
          <span class="navbar-logo-text">TasteFlow</span>
        </a>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Colapsar menú">◀</button>
        <button class="sidebar-close" id="sidebarClose" aria-label="Cerrar menú">✕</button>
      </div>

      <nav class="sidebar-nav">
        <a href="#dashboard" class="sidebar-link active" data-page="dashboard">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          </span> Dashboard
        </a>

        <a href="#recipes" class="sidebar-link" data-page="recipes">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path><line x1="8" y1="7" x2="16" y2="7"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
          </span> Recetas
        </a>
        <a href="#planner" class="sidebar-link" data-page="planner">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line><path d="M8 14h.01"></path><path d="M12 14h.01"></path><path d="M16 14h.01"></path><path d="M8 18h.01"></path><path d="M12 18h.01"></path><path d="M16 18h.01"></path></svg>
          </span> Planificador
        </a>
        <a href="#plans" class="sidebar-link" data-page="plans">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
          </span> Progreso
        </a>
        <a href="#favorites" class="sidebar-link" data-page="favorites">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
          </span> Favoritos
        </a>
        <a href="#shopping" class="sidebar-link" data-page="shopping">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
          </span> Lista de compras
        </a>
        <a href="#profile" class="sidebar-link" data-page="profile">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          </span> Perfil
        </a>
      </nav>

      <div class="sidebar-footer">
        <button class="dark-toggle" id="darkToggle" aria-label="Cambiar tema">
          <span class="dark-toggle-icon">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          </span>
          <span class="dark-toggle-label" id="darkLabel">Modo oscuro</span>
        </button>
        <div class="sidebar-user" id="sidebarUser">
          <div class="sidebar-user-avatar" id="userAvatar">M</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name" id="userName">Usuario</div>
            <div class="sidebar-user-email" id="userEmail">usuario@correo.com</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main class="app-main">
      <div class="app-topbar">
        <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">☰</button>
        <div class="navbar-logo">
          <svg width="28" height="28" viewBox="0 0 36 36" fill="none">
            <rect width="36" height="36" rx="10" fill="#00897B"/>
            <path d="M18 9C15.5 9 13 10.5 12 13C11 15.5 11 18.5 12 21C13 23.5 15 26 18 27C21 26 23 23.5 24 21C25 18.5 25 15.5 24 13C23 10.5 20.5 9 18 9Z" fill="#80CBC4"/>
            <path d="M18 12C16.5 12 15 13 14.5 14.5C14 16 14 18 14.5 19.5C15 21 16.5 22.5 18 23C19.5 22.5 21 21 21.5 19.5C22 18 22 16 21.5 14.5C21 13 19.5 12 18 12Z" fill="#4DB6AC"/>
            <path d="M17.5 9C17.5 9 16 7 17 5.5C18 4 19 5.5 19 5.5" stroke="#80CBC4" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          </svg>
          TasteFlow
        </div>
        <div></div>
      </div>

      <div id="pageContent">
        <!-- Dashboard loaded here -->
      </div>
    </main>

  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
